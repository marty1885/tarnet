# tarnetd default configuration reference
# Auto-generated — do not edit this file.
# To customize, copy settings into tarnetd.toml (next to this file).
# Only settings you want to change need to be specified.

[transport.tcp]
# TCP listen addresses for the overlay network
listen = ["0.0.0.0:7946"]

# STUN servers for public IP detection (used in hello records)
stun = ["stun:stun.l.google.com:19302"]

# Advertise TCP address in hello records (default: false).
# When false, the node is reachable via overlay routing / WebRTC / mDNS only.
advertise = false

# Explicit public address override (skips STUN detection, implies advertise = true)
# public_addr = "123.123.123.123:7946"

[transport.webrtc]
# Enable WebRTC transport for NAT traversal and direct links
enabled = true

# STUN servers for WebRTC ICE
stun = ["stun:stun.l.google.com:19302"]

[transport.ws]
# Enable WebSocket transport (for reverse proxy / firewall traversal)
enabled = false

# WebSocket listen address (plain ws:// — put behind nginx/caddy for wss://)
listen = "0.0.0.0:8080"

# HTTP path for WebSocket upgrade (configurable to hide behind a website)
path = "/tarnet"

# Public URL to advertise in hello records. Without this, WS listens but
# is not advertised — only usable via explicit --connect ws://... bootstrap.
# public_url = "wss://relay.example.com/tarnet"

[core]
# Maximum number of inbound (responder) links. 0 = unlimited.
max_inbound = 128

# Maximum number of outbound (initiator) links. 0 = unlimited.
max_outbound = 48

# Upload bandwidth limit. Supports: 10Mbps, 1MB/s, 500kbps, 1GB/s, etc.
# Empty string or "0" = unlimited.
upload_limit = ""

# Download bandwidth limit. Same format as upload_limit.
download_limit = ""

[bootstrap]
# Bootstrap peer transport URIs (repeatable)
# Supports: tcp://host:port, ws://host/path, wss://host/path
peers = []

# Discovery URIs — resolve peers via external protocols (repeatable)
# Supports: mainline:<hex> (BitTorrent DHT)
discovery = []

# Announce on BitTorrent mainline DHT for remote bootstrap
mainline = false

# Enable mDNS for automatic LAN peer discovery
mdns = true

[socks]
# Enable the built-in SOCKS5 proxy
enabled = true

# SOCKS5 bind addresses (IPv4 and IPv6 loopback by default)
bind = ["127.0.0.1:1080", "[::1]:1080"]

# Allow SOCKS proxy to connect to non-tarnet (clearnet) destinations
allow_clearnet = false
